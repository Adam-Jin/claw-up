name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0 or v0.1.0
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository and private submodule
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.CLAWUP_SUBMODULE_TOKEN }}

      - name: Synchronize submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.3"
          cache-dependency-path: |
            clawup/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clawup/frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\go\bin"

      - name: Install frontend dependencies
        working-directory: clawup/frontend
        run: npm ci

      - name: Resolve release tag
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.version }}"
            if (-not $tag.StartsWith("v")) {
              $tag = "v$tag"
            }
          } else {
            $tag = "${{ github.ref_name }}"
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_VERSION=$($tag.TrimStart('v'))" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Inject Windows version metadata
        working-directory: clawup
        run: |
          $version = $env:RELEASE_VERSION
          if (-not $version) {
            throw "RELEASE_VERSION is empty"
          }
          $fileVersion = "$version.0"
          $infoTmp = Join-Path $env:RUNNER_TEMP "info.json"
          $infoFilter = Join-Path $env:RUNNER_TEMP "info.jq"
          $wailsTmp = Join-Path $env:RUNNER_TEMP "wails.json"
          $wailsFilter = Join-Path $env:RUNNER_TEMP "wails.jq"

          $infoFilterContent = @(
            '.fixed.file_version = $fileVersion'
            '| .info["0000"].ProductVersion = $version'
          ) -join "`n"
          Set-Content -Path $infoFilter -Value $infoFilterContent

          Set-Content -Path $wailsFilter -Value '.info.productVersion = $version'

          jq --arg version "$version" --arg fileVersion "$fileVersion" -f $infoFilter build/windows/info.json | Set-Content $infoTmp
          Move-Item $infoTmp build/windows/info.json -Force

          jq --arg version "$version" -f $wailsFilter wails.json | Set-Content $wailsTmp
          Move-Item $wailsTmp wails.json -Force

          (Get-Content build/windows/installer/project.nsi) `
            -replace '("DisplayVersion"\s+)"[^"]+"', "`$1`"$version`"" `
            | Set-Content build/windows/installer/project.nsi

      - name: Build Windows executable
        working-directory: clawup
        run: |
          Write-Host "Building OpenClaw Installer version $env:RELEASE_VERSION"
          wails doctor
          wails build -clean -platform windows/amd64

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: clawup/build/bin/*.exe
          generate_release_notes: true
